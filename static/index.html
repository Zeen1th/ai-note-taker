<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Note-Taker</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0c0e12;
      --surface: #14161c;
      --surface-2: #1a1d25;
      --surface-3: #20242e;
      --border: #262a34;
      --border-soft: #1d212a;
      --text: #e8eaf0;
      --text-dim: #969cab;
      --text-faint: #6b7280;
      --accent: #6e8bff;
      --accent-hover: #5a78f0;
      --accent-soft: rgba(110, 139, 255, 0.14);
      --danger: #ff6b6b;
      --ok: #4ade80;
      --sp1: #6e8bff; --sp2: #4ade80; --sp3: #fbbf77; --sp4: #c79bff; --sp5: #ff8fb0;
      --radius: 14px;
      --shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI Variable", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb {
      background: var(--surface-3); border-radius: 6px;
      border: 2px solid transparent; background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); }
    ::-webkit-scrollbar-track { background: transparent; }

    /* ---- Desktop title bar (shown only inside pywebview) ---- */
    .titlebar {
      height: 38px; flex-shrink: 0;
      display: none; align-items: center;
      background: var(--bg);
      border-bottom: 1px solid var(--border-soft);
      user-select: none;
    }
    .tb-drag { flex: 1; display: flex; align-items: center; height: 100%; padding-left: 14px; }
    .tb-brand { font-size: 12.5px; font-weight: 600; color: var(--text-dim); letter-spacing: .2px; }
    .tb-controls { display: flex; height: 100%; }
    .tb-btn {
      width: 46px; height: 100%; border: none; background: transparent;
      color: var(--text-dim); font-size: 13px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .tb-btn:hover { background: var(--surface-2); color: var(--text); }
    .tb-close:hover { background: #e0414b; color: #fff; }

    /* ---- App shell ---- */
    .app { flex: 1; display: flex; min-height: 0; }

    .sidebar {
      width: 266px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border-soft);
      display: flex; flex-direction: column; min-height: 0;
      padding: 14px 12px;
    }
    .brand { display: flex; align-items: center; gap: 11px; padding: 4px 6px 14px; }
    .brand-mark {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(140deg, var(--accent), #8a7cff);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      box-shadow: var(--shadow);
    }
    .brand-name { font-size: 14.5px; font-weight: 650; letter-spacing: .2px; }
    .brand-sub { font-size: 11.5px; color: var(--text-faint); margin-top: 1px; }

    .btn-new {
      width: 100%; padding: 9px 12px; border-radius: 10px;
      background: var(--accent); color: #fff; border: none;
      font-size: 13.5px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background .15s;
    }
    .btn-new:hover { background: var(--accent-hover); }

    .lib-head {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-faint);
      padding: 18px 8px 8px;
    }
    .session-list { flex: 1; overflow-y: auto; margin: 0 -4px; padding: 0 4px; }
    .session-item {
      padding: 9px 10px; border-radius: 10px; cursor: pointer;
      margin-bottom: 3px; border: 1px solid transparent; position: relative;
      transition: background .12s;
    }
    .session-item:hover { background: var(--surface-2); }
    .session-item.active { background: var(--accent-soft); border-color: rgba(110,139,255,.3); }
    .session-item .s-title {
      font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 16px;
    }
    .session-item .s-meta { font-size: 11px; color: var(--text-faint); margin-top: 3px; }
    .session-item .s-del {
      position: absolute; top: 8px; right: 7px; color: var(--text-faint);
      font-size: 13px; line-height: 1; opacity: 0; padding: 2px; border-radius: 5px;
    }
    .session-item:hover .s-del { opacity: 1; }
    .session-item .s-del:hover { color: var(--danger); background: var(--surface-3); }

    /* ---- Main column ---- */
    .main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .topbar {
      flex-shrink: 0; display: flex; align-items: center; gap: 10px;
      padding: 14px 22px; border-bottom: 1px solid var(--border-soft);
      flex-wrap: wrap;
    }
    .file-btn {
      display: inline-flex; align-items: center; gap: 8px; max-width: 240px;
      padding: 8px 13px; border-radius: 9px;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 13px; cursor: pointer; transition: border-color .15s;
    }
    .file-btn:hover { border-color: var(--text-faint); }
    .file-btn span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-btn::before { content: "📎"; font-size: 13px; }
    .btn-primary {
      padding: 8px 16px; border-radius: 9px; border: none;
      background: var(--accent); color: #fff; font-size: 13.5px; font-weight: 600;
      transition: background .15s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .div { color: var(--text-faint); font-size: 12px; }
    .btn-record {
      padding: 8px 15px; border-radius: 9px;
      background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
      font-size: 13.5px; font-weight: 600; transition: all .15s;
    }
    .btn-record:hover:not(:disabled) { border-color: var(--danger); color: var(--danger); }
    .btn-record.recording {
      background: var(--danger); color: #fff; border-color: var(--danger);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: .62; } }
    .rec-timer { font-size: 13px; color: var(--danger); font-variant-numeric: tabular-nums; min-width: 42px; font-weight: 600; }

    .main-scroll { flex: 1; overflow-y: auto; padding: 18px 22px 26px; }

    .status { font-size: 13px; color: var(--text-dim); min-height: 18px; }
    .status.error { color: var(--danger); }
    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid var(--surface-3); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
      vertical-align: -2px; margin-right: 7px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-wrap { display: none; margin: 12px 0 4px; }
    .progress-bar {
      height: 10px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 7px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%; border-radius: 7px;
      background: linear-gradient(90deg, var(--accent), #7be0b0);
      transition: width .35s ease;
    }
    .progress-label { font-size: 12px; color: var(--text-dim); margin-top: 6px; font-variant-numeric: tabular-nums; }

    /* ---- Content cards ---- */
    .content {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      align-items: start; margin-top: 14px;
    }
    @media (max-width: 980px) { .content { grid-template-columns: 1fr; } }
    .card {
      background: var(--surface); border: 1px solid var(--border-soft);
      border-radius: var(--radius); padding: 16px 18px; min-height: 130px;
    }
    .card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 13px; }
    .card-head h2 {
      margin: 0; font-size: 11.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-faint);
    }
    .placeholder { color: var(--text-faint); font-size: 13.5px; }
    .empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; color: var(--text-faint); padding: 28px 12px; gap: 8px;
    }
    .empty .ico { font-size: 26px; opacity: .8; }

    /* ---- Transcript ---- */
    .turn { margin-bottom: 14px; padding-left: 12px; border-left: 2px solid var(--border); }
    .turn .who {
      font-weight: 650; font-size: 12.5px; margin-bottom: 2px;
      display: flex; align-items: center; gap: 7px;
    }
    .turn .who::before {
      content: ""; width: 7px; height: 7px; border-radius: 50%;
      background: currentColor; display: inline-block;
    }
    .turn .what { white-space: pre-wrap; font-size: 14px; color: #d4d8e0; }
    .sp-1 { border-left-color: var(--sp1); } .sp-1 .who { color: var(--sp1); }
    .sp-2 { border-left-color: var(--sp2); } .sp-2 .who { color: var(--sp2); }
    .sp-3 { border-left-color: var(--sp3); } .sp-3 .who { color: var(--sp3); }
    .sp-4 { border-left-color: var(--sp4); } .sp-4 .who { color: var(--sp4); }
    .sp-5 { border-left-color: var(--sp5); } .sp-5 .who { color: var(--sp5); }

    /* ---- Notes markdown ---- */
    .notes { font-size: 14px; color: #d4d8e0; }
    .notes :first-child { margin-top: 0; }
    .notes h1, .notes h2, .notes h3 { color: var(--text); line-height: 1.3; }
    .notes h1 { font-size: 19px; } .notes h2 { font-size: 16px; } .notes h3 { font-size: 14.5px; }
    .notes ul, .notes ol { padding-left: 20px; }
    .notes li { margin: 4px 0; }
    .notes strong { color: var(--text); }
    .notes code { background: var(--surface-3); padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }
    .notes blockquote { border-left: 3px solid var(--border); margin: 8px 0; padding-left: 12px; color: var(--text-dim); }

    /* ---- Chat ---- */
    .chat-card { grid-column: 1 / -1; display: flex; flex-direction: column; }
    .messages { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; min-height: 8px; }
    .msg {
      padding: 10px 14px; border-radius: 14px; max-width: 76%;
      white-space: pre-wrap; font-size: 14px; line-height: 1.5;
    }
    .msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 5px; }
    .msg.assistant { background: var(--surface-2); align-self: flex-start; border-bottom-left-radius: 5px; }
    .chat-input { display: flex; gap: 9px; }
    .chat-input input {
      flex: 1; background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); padding: 11px 14px; border-radius: 10px; font-size: 14px;
      outline: none; transition: border-color .15s;
    }
    .chat-input input:focus { border-color: var(--accent); }
    .chat-input input:disabled { opacity: .5; }
  </style>
</head>
<body>
  <div class="titlebar" id="titlebar">
    <div class="tb-drag pywebview-drag-region"><span class="tb-brand">🎙️ AI Note-Taker</span></div>
    <div class="tb-controls">
      <button class="tb-btn" id="tbMin" title="Minimize">&#8211;</button>
      <button class="tb-btn" id="tbMax" title="Maximize">&#9633;</button>
      <button class="tb-btn tb-close" id="tbClose" title="Close">&#10005;</button>
    </div>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">🎙️</span>
        <div>
          <div class="brand-name">AI Note-Taker</div>
          <div class="brand-sub">Local &amp; private</div>
        </div>
      </div>
      <button id="newBtn" class="btn-new">＋ New recording</button>
      <div class="lib-head">Library</div>
      <div id="sessionList" class="session-list">
        <div class="placeholder" style="padding: 8px 10px;">Loading…</div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <label class="file-btn">
          <input type="file" id="file" accept=".mp3,.mp4,.m4a,.wav,.mov,.webm" hidden />
          <span id="fileLabel">Choose file</span>
        </label>
        <button id="transcribeBtn" class="btn-primary">Transcribe</button>
        <span class="div">or</span>
        <button id="recordBtn" class="btn-record">● Record</button>
        <span id="recTimer" class="rec-timer"></span>
      </div>

      <div class="main-scroll">
        <div id="status" class="status"></div>

        <div id="progressWrap" class="progress-wrap">
          <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
          <div id="progressLabel" class="progress-label"></div>
        </div>

        <div class="content">
          <section class="card">
            <div class="card-head"><h2>Transcript</h2></div>
            <div id="transcript">
              <div class="empty"><span class="ico">📝</span><span>Upload or record audio to see the transcript.</span></div>
            </div>
          </section>

          <section class="card">
            <div class="card-head"><h2>Notes</h2></div>
            <div id="notes" class="notes">
              <div class="empty"><span class="ico">✨</span><span>AI-generated notes will appear here.</span></div>
            </div>
          </section>

          <section class="card chat-card">
            <div class="card-head"><h2>Chat about the recording</h2></div>
            <div id="messages" class="messages"></div>
            <div class="chat-input">
              <input type="text" id="chatInput" placeholder="Transcribe a recording first…" disabled />
              <button id="sendBtn" class="btn-primary" disabled>Send</button>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const fileInput = $("file");
    const fileLabel = $("fileLabel");
    const transcribeBtn = $("transcribeBtn");
    const statusEl = $("status");
    const transcriptEl = $("transcript");
    const notesEl = $("notes");
    const messagesEl = $("messages");
    const chatInput = $("chatInput");
    const sendBtn = $("sendBtn");
    const progressWrap = $("progressWrap");
    const progressFill = $("progressFill");
    const progressLabel = $("progressLabel");
    const recordBtn = $("recordBtn");
    const recTimer = $("recTimer");
    const sessionListEl = $("sessionList");
    const newBtn = $("newBtn");

    const EMPTY_TRANSCRIPT = '<div class="empty"><span class="ico">📝</span><span>Upload or record audio to see the transcript.</span></div>';
    const EMPTY_NOTES = '<div class="empty"><span class="ico">✨</span><span>AI-generated notes will appear here.</span></div>';

    let transcript = "";          // speaker-labeled transcript kept in memory
    let chatMessages = [];        // [{role, content}]
    let currentSessionId = null;  // id of the session shown, if loaded from library

    function setStatus(text, isError = false, loading = false) {
      statusEl.className = "status" + (isError ? " error" : "");
      statusEl.innerHTML = loading ? `<span class="spinner"></span>${text}` : text;
    }

    function showProgress(on) {
      progressWrap.style.display = on ? "block" : "none";
      if (on) { progressFill.style.width = "0%"; progressLabel.textContent = ""; }
    }

    function setProgress(pct, stage, elapsed) {
      progressFill.style.width = `${pct}%`;
      const secs = elapsed != null ? ` · ${elapsed.toFixed(1)}s` : "";
      progressLabel.textContent = `${stage || ""} — ${pct}%${secs}`;
    }

    function speakerIndex(label) {
      const m = /Speaker (\d+)/.exec(label);
      const n = m ? parseInt(m[1], 10) : 1;
      return ((n - 1) % 5) + 1;  // cycle through 5 colors
    }

    function renderTranscript(segments) {
      transcriptEl.innerHTML = "";
      let lastSpeaker = null;
      let turnEl = null;
      let whatEl = null;
      for (const seg of segments) {
        if (seg.speaker !== lastSpeaker) {
          turnEl = document.createElement("div");
          turnEl.className = `turn sp-${speakerIndex(seg.speaker)}`;
          const who = document.createElement("div");
          who.className = "who";
          who.textContent = seg.speaker;
          whatEl = document.createElement("div");
          whatEl.className = "what";
          whatEl.textContent = seg.text;
          turnEl.appendChild(who);
          turnEl.appendChild(whatEl);
          transcriptEl.appendChild(turnEl);
          lastSpeaker = seg.speaker;
        } else {
          whatEl.textContent += " " + seg.text;
        }
      }
    }

    async function postJSON(url, body) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || `Request failed (${res.status})`);
      return data;
    }

    // Shared by both the file-upload button and the live recorder.
    async function processAudio(blob, filename) {
      transcribeBtn.disabled = true;
      recordBtn.disabled = true;
      setStatus("Transcribing locally… (the very first run also downloads models once).", false, true);
      showProgress(true);
      transcriptEl.innerHTML = '<div class="placeholder">Working…</div>';
      notesEl.innerHTML = '<div class="placeholder">Working…</div>';

      try {
        const form = new FormData();
        form.append("file", blob, filename);
        const res = await fetch("/api/transcribe", { method: "POST", body: form });

        // A non-streaming error (e.g. 400 bad file type) comes back as JSON.
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || `Request failed (${res.status})`);
        }

        // Stream of newline-delimited JSON progress/result/error events.
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let result = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();  // keep any partial line
          for (const line of lines) {
            if (!line.trim()) continue;
            const evt = JSON.parse(line);
            if (evt.type === "progress") {
              setProgress(evt.pct, evt.stage, evt.elapsed);
            } else if (evt.type === "result") {
              setProgress(100, "Done", evt.elapsed);
              result = evt;
            } else if (evt.type === "error") {
              throw new Error(evt.detail);
            }
          }
        }

        if (!result) throw new Error("Transcription ended without a result.");

        transcript = result.transcript || "";
        renderTranscript(result.segments || []);
        notesEl.innerHTML = marked.parse(result.notes || "");

        chatMessages = [];
        messagesEl.innerHTML = "";
        chatInput.disabled = false;
        sendBtn.disabled = false;
        chatInput.placeholder = "Ask something about the recording…";
        currentSessionId = result.session ? result.session.id : null;
        loadSessions();  // the new session was saved server-side; refresh the library
        const speakers = result.num_speakers != null ? ` · ${result.num_speakers} speaker(s)` : "";
        if (result.warning) {
          setStatus(`Done in ${(result.elapsed || 0).toFixed(1)}s${speakers}. ⚠️ ${result.warning}`, true);
        } else {
          setStatus(`Done in ${(result.elapsed || 0).toFixed(1)}s${speakers}.`);
        }
      } catch (err) {
        setStatus(err.message, true);
        transcriptEl.innerHTML = EMPTY_TRANSCRIPT;
        notesEl.innerHTML = EMPTY_NOTES;
      } finally {
        transcribeBtn.disabled = false;
        recordBtn.disabled = false;
        setTimeout(() => showProgress(false), 1200);
      }
    }

    fileInput.addEventListener("change", () => {
      fileLabel.textContent = fileInput.files[0] ? fileInput.files[0].name : "Choose file";
    });

    transcribeBtn.addEventListener("click", () => {
      const file = fileInput.files[0];
      if (!file) { setStatus("Please choose a file first.", true); return; }
      processAudio(file, file.name);
    });

    // ---- Live recording: mic + desktop audio, mixed into one .webm ----
    let mediaRecorder = null;
    let recStreams = [];        // raw streams to stop on finish
    let recChunks = [];
    let recAudioCtx = null;
    let recTimerId = null;
    let recStart = 0;

    function stopRecStreams() {
      recStreams.forEach((s) => s.getTracks().forEach((t) => t.stop()));
      recStreams = [];
      if (recAudioCtx) { recAudioCtx.close().catch(() => {}); recAudioCtx = null; }
      if (recTimerId) { clearInterval(recTimerId); recTimerId = null; }
      recTimer.textContent = "";
    }

    function tickTimer() {
      const s = Math.floor((Date.now() - recStart) / 1000);
      const m = Math.floor(s / 60);
      recTimer.textContent = `${m}:${String(s % 60).padStart(2, "0")}`;
    }

    async function startRecording() {
      let micStream, desktopStream = null;

      // Microphone (required).
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        setStatus("Microphone access was blocked. Allow it to record.", true);
        return;
      }

      // Desktop/system audio (optional — Chromium shows a screen-share prompt).
      try {
        desktopStream = await navigator.mediaDevices.getDisplayMedia({
          video: true,
          audio: true,
        });
        if (desktopStream.getAudioTracks().length === 0) {
          desktopStream.getTracks().forEach((t) => t.stop());
          desktopStream = null;
          setStatus("No system audio captured — recording mic only. (Tip: pick 'Entire Screen' and tick 'Share system audio'.)", false);
        }
      } catch (err) {
        // User cancelled or denied — fall back to mic only.
        desktopStream = null;
      }

      // Mix sources into one track.
      recAudioCtx = new AudioContext();
      const dest = recAudioCtx.createMediaStreamDestination();
      recStreams = [micStream];
      recAudioCtx.createMediaStreamSource(micStream).connect(dest);
      if (desktopStream) {
        recStreams.push(desktopStream);
        recAudioCtx.createMediaStreamSource(desktopStream).connect(dest);
      }

      recChunks = [];
      mediaRecorder = new MediaRecorder(dest.stream, { mimeType: "audio/webm" });
      mediaRecorder.ondataavailable = (e) => { if (e.data.size) recChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stopRecStreams();
        const blob = new Blob(recChunks, { type: "audio/webm" });
        if (blob.size === 0) { setStatus("Recording was empty.", true); return; }
        processAudio(blob, "recording.webm");
      };
      mediaRecorder.start();

      // If the user stops the screen-share from the browser bar, end the recording.
      if (desktopStream) {
        desktopStream.getVideoTracks().forEach((t) => {
          t.onended = () => { if (mediaRecorder && mediaRecorder.state === "recording") stopRecording(); };
        });
      }

      recStart = Date.now();
      tickTimer();
      recTimerId = setInterval(tickTimer, 1000);
      recordBtn.classList.add("recording");
      recordBtn.textContent = "■ Stop";
      transcribeBtn.disabled = true;
      const src = desktopStream ? "mic + desktop audio" : "mic only";
      setStatus(`Recording (${src})… press Stop when done.`, false);
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
      recordBtn.classList.remove("recording");
      recordBtn.textContent = "● Record";
      transcribeBtn.disabled = false;
    }

    recordBtn.addEventListener("click", () => {
      if (mediaRecorder && mediaRecorder.state === "recording") stopRecording();
      else startRecording();
    });

    function appendMessage(role, content) {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.textContent = content;
      messagesEl.appendChild(el);
      el.scrollIntoView({ behavior: "smooth", block: "end" });
      return el;
    }

    async function sendChat() {
      const text = chatInput.value.trim();
      if (!text || !transcript) return;

      chatInput.value = "";
      appendMessage("user", text);
      chatMessages.push({ role: "user", content: text });

      chatInput.disabled = true;
      sendBtn.disabled = true;
      const pending = appendMessage("assistant", "…");

      try {
        const data = await postJSON("/api/chat", { transcript, messages: chatMessages });
        pending.textContent = data.reply || "(no reply)";
        chatMessages.push({ role: "assistant", content: data.reply || "" });
      } catch (err) {
        pending.textContent = "⚠️ " + err.message;
        pending.style.color = "var(--danger)";
      } finally {
        chatInput.disabled = false;
        sendBtn.disabled = false;
        chatInput.focus();
      }
    }

    sendBtn.addEventListener("click", sendChat);
    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendChat();
    });

    // ---- Session library ----
    function fmtDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) +
             " " + d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
    }

    function renderSessionList(sessions) {
      sessionListEl.innerHTML = "";
      if (!sessions.length) {
        sessionListEl.innerHTML = '<div class="placeholder" style="padding:8px 10px;">No saved sessions yet.</div>';
        return;
      }
      for (const s of sessions) {
        const item = document.createElement("div");
        item.className = "session-item" + (s.id === currentSessionId ? " active" : "");
        const dur = s.duration ? `${Math.round(s.duration / 60)} min · ` : "";
        item.innerHTML =
          `<div class="s-title"></div>` +
          `<div class="s-meta">${fmtDate(s.created_at)} · ${dur}${s.num_speakers || 0} speaker(s)</div>` +
          `<span class="s-del" title="Delete">✕</span>`;
        item.querySelector(".s-title").textContent = s.title;
        item.addEventListener("click", (e) => {
          if (e.target.classList.contains("s-del")) return;
          openSession(s.id);
        });
        item.querySelector(".s-del").addEventListener("click", (e) => {
          e.stopPropagation();
          deleteSession(s.id, s.title);
        });
        item.querySelector(".s-title").addEventListener("dblclick", (e) => {
          e.stopPropagation();
          renameSession(s.id, s.title);
        });
        sessionListEl.appendChild(item);
      }
    }

    async function loadSessions() {
      try {
        const sessions = await (await fetch("/api/sessions")).json();
        renderSessionList(sessions);
      } catch (err) {
        sessionListEl.innerHTML = '<div class="placeholder" style="padding:8px 10px;">Could not load library.</div>';
      }
    }

    async function openSession(id) {
      try {
        const s = await (await fetch(`/api/sessions/${id}`)).json();
        transcript = s.transcript || "";
        renderTranscript(s.segments || []);
        notesEl.innerHTML = marked.parse(s.notes || "");
        chatMessages = [];
        messagesEl.innerHTML = "";
        chatInput.disabled = false;
        sendBtn.disabled = false;
        chatInput.placeholder = "Ask something about the recording…";
        currentSessionId = id;
        renderSessionList(await (await fetch("/api/sessions")).json());
        setStatus(`Loaded “${s.title}” · ${s.num_speakers || 0} speaker(s).`);
      } catch (err) {
        setStatus("Could not open that session.", true);
      }
    }

    async function deleteSession(id, title) {
      if (!confirm(`Delete “${title}”? This removes its transcript, notes, and audio.`)) return;
      try {
        await fetch(`/api/sessions/${id}`, { method: "DELETE" });
        if (id === currentSessionId) newSession();
        loadSessions();
      } catch (err) {
        setStatus("Could not delete that session.", true);
      }
    }

    async function renameSession(id, oldTitle) {
      const title = prompt("Rename session:", oldTitle);
      if (!title || title.trim() === oldTitle) return;
      try {
        await fetch(`/api/sessions/${id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: title.trim() }),
        });
        loadSessions();
      } catch (err) {
        setStatus("Could not rename that session.", true);
      }
    }

    function newSession() {
      currentSessionId = null;
      transcript = "";
      chatMessages = [];
      messagesEl.innerHTML = "";
      transcriptEl.innerHTML = EMPTY_TRANSCRIPT;
      notesEl.innerHTML = EMPTY_NOTES;
      chatInput.disabled = true;
      sendBtn.disabled = true;
      chatInput.placeholder = "Transcribe a recording first…";
      fileInput.value = "";
      fileLabel.textContent = "Choose file";
      setStatus("");
      loadSessions();
    }

    newBtn.addEventListener("click", newSession);
    loadSessions();  // populate the library on page load

    // ---- Desktop title bar (only when running inside pywebview) ----
    function initDesktop() {
      if (!window.pywebview || !window.pywebview.api) return;
      $("titlebar").style.display = "flex";
      $("tbMin").addEventListener("click", () => window.pywebview.api.minimize());
      $("tbMax").addEventListener("click", () => window.pywebview.api.toggle_maximize());
      $("tbClose").addEventListener("click", () => window.pywebview.api.close());
    }
    window.addEventListener("pywebviewready", initDesktop);
    if (window.pywebview && window.pywebview.api) initDesktop();
  </script>
</body>
</html>
