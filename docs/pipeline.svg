<svg viewBox="0 0 720 770" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="AI Note-Taker runtime pipeline">
  <title>AI Note-Taker runtime pipeline</title>
  <desc>Audio flows through decode (CPU), transcribe/align/diarize (GPU), build transcript (CPU), write notes and chat (GPU via Ollama), then displays in the browser.</desc>

  <rect x="0" y="0" width="720" height="770" rx="14" fill="#0f1115"/>

  <!-- Title + legend -->
  <text x="360" y="36" font-size="18" font-weight="700" fill="#e6e8ec" text-anchor="middle">How a recording becomes notes</text>
  <rect x="278" y="54" width="13" height="13" rx="3" fill="#34d399"/>
  <text x="297" y="65" font-size="12.5" fill="#9aa3b2">GPU</text>
  <rect x="353" y="54" width="13" height="13" rx="3" fill="#8b93a1"/>
  <text x="372" y="65" font-size="12.5" fill="#9aa3b2">CPU</text>

  <!-- connectors -->
  <g stroke="#6b7280" stroke-width="1.5">
    <path d="M360,144 L360,156" /><path d="M355,151 L360,157 L365,151" fill="none"/>
    <path d="M360,214 L360,226" /><path d="M355,221 L360,227 L365,221" fill="none"/>
    <path d="M360,284 L360,296" /><path d="M355,291 L360,297 L365,291" fill="none"/>
    <path d="M360,354 L360,366" /><path d="M355,361 L360,367 L365,361" fill="none"/>
    <path d="M360,424 L360,436" /><path d="M355,431 L360,437 L365,431" fill="none"/>
    <path d="M360,494 L360,506" /><path d="M355,501 L360,507 L365,501" fill="none"/>
    <path d="M360,564 L360,576" /><path d="M355,571 L360,577 L365,571" fill="none"/>
    <path d="M360,634 L360,646" /><path d="M355,641 L360,647 L365,641" fill="none"/>
  </g>

  <!-- Row 0: input -->
  <rect x="150" y="92" width="420" height="52" rx="10" fill="#1b1f27" stroke="#3a4150" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="170" y="115" font-size="15" font-weight="600" fill="#e6e8ec">Audio in</text>
  <text x="170" y="133" font-size="11.5" fill="#9aa3b2">file upload, or live mic + desktop recording</text>

  <!-- Row 1: decode CPU -->
  <rect x="150" y="162" width="420" height="52" rx="10" fill="#1b1f27" stroke="#2a2f3a" stroke-width="1.3"/>
  <rect x="160" y="175" width="4" height="26" rx="2" fill="#8b93a1"/>
  <text x="176" y="185" font-size="15" font-weight="600" fill="#e6e8ec">Decode audio</text>
  <text x="176" y="203" font-size="11.5" fill="#9aa3b2">ffmpeg &#8594; 16 kHz waveform</text>
  <rect x="500" y="177" width="54" height="22" rx="11" fill="none" stroke="#8b93a1" stroke-width="1.2"/>
  <text x="527" y="192" font-size="11.5" font-weight="600" fill="#8b93a1" text-anchor="middle">CPU</text>

  <!-- Row 2: transcribe GPU -->
  <rect x="150" y="232" width="420" height="52" rx="10" fill="#1b1f27" stroke="#2a2f3a" stroke-width="1.3"/>
  <rect x="160" y="245" width="4" height="26" rx="2" fill="#34d399"/>
  <text x="176" y="255" font-size="15" font-weight="600" fill="#e6e8ec">Transcribe speech &#8594; text</text>
  <text x="176" y="273" font-size="11.5" fill="#9aa3b2">Whisper distil-large-v3 &#183; CTranslate2</text>
  <rect x="500" y="247" width="54" height="22" rx="11" fill="none" stroke="#34d399" stroke-width="1.2"/>
  <text x="527" y="262" font-size="11.5" font-weight="600" fill="#34d399" text-anchor="middle">GPU</text>

  <!-- Row 3: align GPU -->
  <rect x="150" y="302" width="420" height="52" rx="10" fill="#1b1f27" stroke="#2a2f3a" stroke-width="1.3"/>
  <rect x="160" y="315" width="4" height="26" rx="2" fill="#34d399"/>
  <text x="176" y="325" font-size="15" font-weight="600" fill="#e6e8ec">Align word timings</text>
  <text x="176" y="343" font-size="11.5" fill="#9aa3b2">wav2vec2 alignment model</text>
  <rect x="500" y="317" width="54" height="22" rx="11" fill="none" stroke="#34d399" stroke-width="1.2"/>
  <text x="527" y="332" font-size="11.5" font-weight="600" fill="#34d399" text-anchor="middle">GPU</text>

  <!-- Row 4: diarize GPU -->
  <rect x="150" y="372" width="420" height="52" rx="10" fill="#1b1f27" stroke="#2a2f3a" stroke-width="1.3"/>
  <rect x="160" y="385" width="4" height="26" rx="2" fill="#34d399"/>
  <text x="176" y="395" font-size="15" font-weight="600" fill="#e6e8ec">Identify speakers</text>
  <text x="176" y="413" font-size="11.5" fill="#9aa3b2">pyannote &#183; who spoke when</text>
  <rect x="500" y="387" width="54" height="22" rx="11" fill="none" stroke="#34d399" stroke-width="1.2"/>
  <text x="527" y="402" font-size="11.5" font-weight="600" fill="#34d399" text-anchor="middle">GPU</text>

  <!-- Row 5: build CPU -->
  <rect x="150" y="442" width="420" height="52" rx="10" fill="#1b1f27" stroke="#2a2f3a" stroke-width="1.3"/>
  <rect x="160" y="455" width="4" height="26" rx="2" fill="#8b93a1"/>
  <text x="176" y="465" font-size="15" font-weight="600" fill="#e6e8ec">Build labeled transcript</text>
  <text x="176" y="483" font-size="11.5" fill="#9aa3b2">map to Speaker 1/2 &#183; merge turns</text>
  <rect x="500" y="457" width="54" height="22" rx="11" fill="none" stroke="#8b93a1" stroke-width="1.2"/>
  <text x="527" y="472" font-size="11.5" font-weight="600" fill="#8b93a1" text-anchor="middle">CPU</text>

  <!-- Row 6: notes GPU -->
  <rect x="150" y="512" width="420" height="52" rx="10" fill="#1b1f27" stroke="#2a2f3a" stroke-width="1.3"/>
  <rect x="160" y="525" width="4" height="26" rx="2" fill="#34d399"/>
  <text x="176" y="535" font-size="15" font-weight="600" fill="#e6e8ec">Write structured notes</text>
  <text x="176" y="553" font-size="11.5" fill="#9aa3b2">Ollama &#183; qwen3:8b (separate process)</text>
  <rect x="500" y="527" width="54" height="22" rx="11" fill="none" stroke="#34d399" stroke-width="1.2"/>
  <text x="527" y="542" font-size="11.5" font-weight="600" fill="#34d399" text-anchor="middle">GPU</text>

  <!-- Row 7: output -->
  <rect x="150" y="582" width="420" height="52" rx="10" fill="#1b1f27" stroke="#3a4150" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="170" y="605" font-size="15" font-weight="600" fill="#e6e8ec">Show in browser</text>
  <text x="170" y="623" font-size="11.5" fill="#9aa3b2">speaker transcript + rendered notes</text>

  <!-- Row 8: chat GPU -->
  <rect x="150" y="652" width="420" height="52" rx="10" fill="#1b1f27" stroke="#2a2f3a" stroke-width="1.3"/>
  <rect x="160" y="665" width="4" height="26" rx="2" fill="#34d399"/>
  <text x="176" y="675" font-size="15" font-weight="600" fill="#e6e8ec">Chat about it</text>
  <text x="176" y="693" font-size="11.5" fill="#9aa3b2">Ollama &#183; qwen3:8b &#183; transcript re-sent each time</text>
  <rect x="500" y="667" width="54" height="22" rx="11" fill="none" stroke="#34d399" stroke-width="1.2"/>
  <text x="527" y="682" font-size="11.5" font-weight="600" fill="#34d399" text-anchor="middle">GPU</text>
</svg>
